name: LLM RAG Eval

# Run on every push and pull request to main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rag-eval:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run evaluation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MODEL: llama-3.3-70b-versatile
          JUDGE_MODEL: llama-3.3-70b-versatile
        run: python eval.py

      - name: Quality gate
        run: python gate.py

      - name: Upload results
        if: always()          # keep the report even if the gate fails
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: results.json
